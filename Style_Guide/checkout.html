<!DOCTYPE html>
<html>

  <head>

    <meta charset="utf-8">
    <title>P01 - Style Guide Template</title>

    <link href="css/main.css" rel="stylesheet">

    <!--Link to Lexend Font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">

  </head>  
  <body>
    <header>
        <h1>Checkout Page (Template)</h1>
        <nav>
          <a href="index.html">Home</a>
          <a href="index.html">Menu</a>
          <a href="index.html">About</a>
          <a href="index.html">Locations</a>
          <a href="index.html">Back to Stylesheet</a>
        </nav>
    </header> <br>

    <div class="checkoutLayout">
      <div id="paymentForm">
        <h4>PAYMENT FORM</h4>

          <form action="payment">

            <div class="radioButton">
              <label for="credit">Credit</label>
              <input type="radio" id="credit" name="payment">
            </div>
                
            <div class="radioButton">
              <label for="debit">Debit</label>
              <input type="radio" id="debit" name="payment">
            </div>

            <div class="inputGroup">
              <label>Card Number</label>
              <input type="text" name="number" placeholder="Type here...">
            </div>

            <div class="inputGroup">
              <label>CVC</label>
              <input type="text" name="number" placeholder="Type here...">
  
            </div>

            <div class="inputGroup">
              <label>Your Name</label>
              <input type="text" name="number" placeholder="First and Last Name">
            </div>

            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
          </form> 
      </div>

      <div id="orderSummary">
        <h4>ORDER SUMMARY</h4>

        <div class="inline">
          <h5>Cheese Pizza 1</h5> <h5>(M) $17.75</h5>
        </div>

        <div class="inline">
          <h5>Strawberry Short Cake 2</h5> <h5>$7.75</h5>
        </div>

        <p>Tax calculated based on shipping address.</p>

        <div class="inline topMargin element">
          <h5>Subtotal</h5> <h5>$33.25 CAD</h5>
        </div>

        <div class="inline">
          <h5>Estimated Total</h5> <h5>$38.97 CAD</h5>
        </div>

        <button type="submit">CONTINUE SHOPPING</button>
      </div>
    </div>
  </body>
